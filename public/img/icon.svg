  <title
     id="title1">Network of circles around a magnifying glass with an arrow piercing through</title>
  <desc
     id="desc1">Eight small circles arranged in a hexagonal network around a central magnifying glass, with an arrow passing diagonally through the lens from lower-left to upper-right</desc>
